<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>下单购物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #11998e;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.4);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .points-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            color: #856404;
            text-align: center;
            font-weight: bold;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #11998e;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>下单购物</h1>
        <p class="subtitle">每消费100元获得10积分</p>
        <form id="orderForm">
            <div class="form-group">
                <label for="userId">用户ID</label>
                <input type="number" id="userId" name="userId" placeholder="请输入用户ID" required min="1">
            </div>
            <div class="form-group">
                <label for="amount">订单金额（元）</label>
                <input type="number" id="amount" name="amount" placeholder="请输入订单金额" required min="0.01" step="0.01">
            </div>
            <button type="submit" class="btn">提交订单</button>
        </form>
        <div id="result" class="result"></div>
        <div id="pointsInfo" class="points-info" style="display: none;"></div>
        <a href="/" class="back-link">返回首页</a>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const resultDiv = document.getElementById('result');
            const pointsDiv = document.getElementById('pointsInfo');

            const expectedPoints = Math.floor(amount / 100) * 10;
            pointsDiv.style.display = 'block';
            pointsDiv.innerHTML = '预计获得积分: ' + expectedPoints + ' 点';

            fetch('/api/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userId: parseInt(userId), amount: amount })
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    return response.json().then(err => { throw err });
                }
            })
            .then(data => {
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '下单成功！<br>订单ID: ' + data.id + '<br>订单金额: ¥' + data.amount + '<br>获得积分: ' + data.pointsEarned + ' 点';
            })
            .catch(error => {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '下单失败：' + (error.message || '用户不存在');
                pointsDiv.style.display = 'none';
            });
        });

        document.getElementById('amount').addEventListener('input', function(e) {
            const amount = parseFloat(e.target.value) || 0;
            const expectedPoints = Math.floor(amount / 100) * 10;
            const pointsDiv = document.getElementById('pointsInfo');
            pointsDiv.style.display = 'block';
            pointsDiv.innerHTML = '预计获得积分: ' + expectedPoints + ' 点';
        });
    </script>
</body>
</html>
