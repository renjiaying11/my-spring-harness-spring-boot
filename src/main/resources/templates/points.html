<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>积分查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #f093fb;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(240, 147, 251, 0.4);
        }
        .points-display {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            text-align: center;
        }
        .points-display h2 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .points-display .username {
            font-size: 18px;
            opacity: 0.9;
        }
        .records {
            margin-top: 20px;
            display: none;
        }
        .records h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .record-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .record-item .type {
            color: #666;
        }
        .record-item .points {
            color: #28a745;
            font-weight: bold;
            font-size: 18px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #f093fb;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>积分查询</h1>
        <form id="queryForm">
            <div class="form-group">
                <label for="userId">用户ID</label>
                <input type="number" id="userId" name="userId" placeholder="请输入用户ID" required min="1">
            </div>
            <button type="submit" class="btn">查询积分</button>
        </form>
        <div id="error" class="error"></div>
        <div id="pointsDisplay" class="points-display">
            <h2 id="balance">0</h2>
            <div class="username" id="username"></div>
        </div>
        <div id="records" class="records">
            <h3>积分记录</h3>
            <div id="recordsList"></div>
        </div>
        <a href="/" class="back-link">返回首页</a>
    </div>

    <script>
        document.getElementById('queryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const errorDiv = document.getElementById('error');
            const pointsDiv = document.getElementById('pointsDisplay');
            const recordsDiv = document.getElementById('records');

            fetch('/api/points/' + userId)
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error('用户不存在');
                }
            })
            .then(data => {
                errorDiv.style.display = 'none';
                pointsDiv.style.display = 'block';
                document.getElementById('balance').innerText = data.balance + ' 积分';
                document.getElementById('username').innerText = '用户: ' + data.username;

                if (data.recentRecords && data.recentRecords.length > 0) {
                    recordsDiv.style.display = 'block';
                    let recordsHtml = '';
                    data.recentRecords.forEach(record => {
                        const date = new Date(record.createdAt).toLocaleString('zh-CN');
                        recordsHtml += '<div class="record-item">' +
                            '<span class="type">订单奖励 #' + record.orderId + '<br><small>' + date + '</small></span>' +
                            '<span class="points">+' + record.points + '</span>' +
                        '</div>';
                    });
                    document.getElementById('recordsList').innerHTML = recordsHtml;
                } else {
                    recordsDiv.style.display = 'none';
                }
            })
            .catch(error => {
                errorDiv.style.display = 'block';
                errorDiv.innerText = error.message;
                pointsDiv.style.display = 'none';
                recordsDiv.style.display = 'none';
            });
        });
    </script>
</body>
</html>
